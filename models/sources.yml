version: 2

sources:
  - name: source_db
    description: "Neon PostgreSQL source database"
    schema: public
    tables:
      - name: src_employees
        description: "Source 1 - Employee orders (88 rows)"
        columns:
          - name: order_id
          - name: customer_id
          - name: status
          - name: salesman_id
          - name: order_date
      - name: src_users
        description: "Source 2 - User orders with audit dates (106 rows)"
        columns:
          - name: order_id
          - name: customer_id
          - name: status
          - name: salesman_id
          - name: order_date
          - name: auditrunddate
      - name: lkp_users
        description: "Lookup reference table (106 rows)"
        columns:
          - name: order_id
          - name: customer_id
          - name: status
          - name: salesman_id
          - name: order_date
          - name: auditrunddate