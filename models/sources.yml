version: 2

sources:
  - name: source_db
    schema: public
    tables:
      - name: source
        description: "Primary source table for M_Mass_Ingestion"
        columns:
          - name: employee_id
          - name: first_name
          - name: last_name
          - name: department
          - name: job_title
      - name: lkp_lookup
        description: "Lookup table for m_joiner_lkp"
        columns:
          - name: order_id
      - name: source1
        description: "Additional source (Source1) for m_joiner_lkp"
        columns:
          - name: order_id
          - name: customer_id
          - name: status
          - name: salesman_id
          - name: order_date
          - name: auditrundate
  - name: Src_Contact
    schema: public
    tables:
      - name: src_contact
        description: "Primary source table for m_Dynamic_Mapping_Task"
        columns:
          - name: id
          - name: firstname
          - name: lastname
          - name: homephone
          - name: cellphone
  - name: Mapplet
    schema: public
    tables:
      - name: mapplet
        description: "Primary source table for mplt_QuaterlySal"
        columns:
          - name: salary
  - name: Src_EmployeesDistortedData
    schema: public
    tables:
      - name: src_employeesdistorteddata
        description: "Primary source table for m_MacroExpression"
        columns:
          - name: employee_id
          - name: first_name
          - name: last_name
          - name: email
          - name: phone
  - name: Src_Employees
    schema: public
    tables:
      - name: src_employees
        description: "Primary source table for m_AllTransformationMapping"
        columns:
          - name: employee_id
          - name: first_name
          - name: last_name
          - name: email
          - name: phone
  - name: Source_EMP_V3
    schema: public
    tables:
      - name: source_emp_v3
        description: "Primary source table for m_SCD_Type2"
        columns:
          - name: emp_id
          - name: first_name
          - name: last_name
          - name: email
          - name: gender
