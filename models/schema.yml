version: 2

models:
  - name: joiner_lookup_m_joiner_lkp
    description: "Joiner + Lookup enrichment view for PROJECT10 m_joiner_lkp mapping"
    columns:
      - name: order_id
        description: "Primary order identifier from src_users"
        tests:
          - not_null
      - name: customer_id
        description: "Customer identifier"
        tests:
          - not_null
      - name: status
        description: "Order status"
      - name: salesman_id
        description: "Salesman identifier"
      - name: order_date
        description: "Order date"
      - name: auditrunddate
        description: "Audit run date from src_users"
      - name: src1_order_id
        description: "Matched order_id from src_employees (null if no match)"
      - name: lkp_order_id
        description: "Lookup order_id from lkp_users"
      - name: lkp_customer_id
        description: "Lookup customer_id from lkp_users"
      - name: lkp_status
        description: "Lookup status from lkp_users"
      - name: etl_load_dts
        description: "ETL load timestamp"
        tests:
          - not_null