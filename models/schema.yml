version: 2

models:
  - name: joiner_lookup_m_joiner_lkp
    description: "IICS m_joiner_lkp: Joiner(INNER JOIN src_employees + src_users) + Lookup(lkp_users -> AuditRunDate) -> Tgt_Employees"
    columns:
      - name: order_id
        description: "Primary key from Source (src_employees master)"
        tests:
          - not_null
      - name: customer_id
        description: "Customer identifier from joined sources"
        tests:
          - not_null
      - name: status
        description: "Order status from joined sources"
      - name: salesman_id
        description: "Salesman identifier from joined sources"
      - name: order_date
        description: "Order date from joined sources"
      - name: auditrundate
        description: "AuditRunDate enriched via Lookup from lkp_users"
      - name: etl_load_dts
        description: "ETL load timestamp"
        tests:
          - not_null