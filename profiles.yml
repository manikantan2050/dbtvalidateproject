jinjaneering:
  target: dev
  outputs:
    dev:
      type: databricks
      catalog: main
      schema: dev_transform
      host: "{{ env_var('DBT_HOST') }}"
      http_path: "{{ env_var('DBT_HTTP_PATH') }}"
      token: "{{ env_var('DBT_TOKEN') }}"
      threads: 4

    staging:
      type: databricks
      catalog: main
      schema: stg_transform
      host: "{{ env_var('DBT_HOST') }}"
      http_path: "{{ env_var('DBT_HTTP_PATH') }}"
      token: "{{ env_var('DBT_TOKEN') }}"
      threads: 8

    prod:
      type: databricks
      catalog: main
      schema: prod_transform
      host: "{{ env_var('DBT_HOST') }}"
      http_path: "{{ env_var('DBT_HTTP_PATH') }}"
      token: "{{ env_var('DBT_TOKEN') }}"
      threads: 16
